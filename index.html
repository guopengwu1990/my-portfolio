<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的作品集</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gold-accent { color: #b8860b; }
        .bg-gold { background-color: #b8860b; }
        .waterfall { columns: 1; gap: 1.5rem; }
        @media (min-width: 768px) { .waterfall { columns: 2; } }
        @media (min-width: 1024px) { .waterfall { columns: 3; } }
        .card { break-inside: avoid; margin-bottom: 1.5rem; }
    </style>
</head>
<body class="bg-white text-gray-900 font-sans">
    <nav class="container mx-auto py-6 px-4 flex justify-between items-center">
        <div class="text-xl font-bold tracking-tighter">DESIGN.PORTFOLIO</div>
        <div class="space-x-6 text-sm font-medium">
            <a href="#" class="hover:text-amber-600">作品</a>
            <a href="#" class="hover:text-amber-600">关于</a>
            <a href="#" class="bg-black text-white px-4 py-2 rounded-full">联系我</a>
        </div>
    </nav>

    <header class="container mx-auto pt-20 pb-16 px-4">
        <span class="inline-block px-3 py-1 bg-gold text-white text-xs font-bold rounded-full mb-4">AVAILABLE FOR HIRE</span>
        <h1 class="text-6xl font-bold mb-6">你好，我是设计师</h1>
        <p class="text-xl text-gray-500 max-w-2xl">这是我的个人作品展示页面，欢迎查看。</p>
    </header>

    <main class="container mx-auto px-4 pb-20">
        <div class="waterfall">
            <div class="card group border border-gray-100 rounded-xl overflow-hidden hover:shadow-xl transition-all">
                <img src="https://images.unsplash.com/photo-1558655146-d09347e92766?auto=format&fit=crop&w=800" class="w-full">
                <div class="p-5">
                    <span class="text-xs font-bold gold-accent uppercase">UI/UX 设计</span>
                    <h3 class="text-lg font-bold mt-1">项目案例展示</h3>
                </div>
            </div>
            </div>
    </main>
</body>
</html>
