<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的作品集 | Pinterest Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Pinterest 瀑布流核心：多列布局 */
        .masonry-grid {
            column-count: 1;
            column-gap: 1.5rem;
            width: 100%;
        }
        /* 响应式：平板 2 列，桌面 3 列，大屏 4 列 */
        @media (min-width: 640px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1280px) { .masonry-grid { column-count: 4; } }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
            display: block;
        }

        .gold-accent { color: #b8860b; }
        .bg-gold { background-color: #b8860b; }
        
        /* 悬浮阴影动画 */
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="container mx-auto py-4 px-6 flex justify-between items-center">
            <div class="text-xl font-black tracking-tighter italic">DESIGN.LAB</div>
            <div class="flex items-center gap-8 text-sm font-bold uppercase tracking-widest">
                <a href="#" class="hover:gold-accent">Works</a>
                <a href="#" class="hover:gold-accent">About</a>
                <a href="mailto:your@email.com" class="bg-black text-white px-6 py-2 rounded-full hover:bg-gold transition-colors">Contact</a>
            </div>
        </div>
    </nav>

    <header class="container mx-auto pt-20 pb-12 px-6">

            <p id="user-bio" class="text-xl text-gray-500 leading-relaxed">正在同步您的个人资料内容...</p>
        </div>
    </header>

    <main class="container mx-auto px-6 pb-20">

    </main>

            },
            // 你可以继续复制上面的块，直到 50 个...
        ];

        // --- 逻辑处理（无需修改） ---
        function renderPage() {
            document.getElementById('user-name').innerText = profileData.name;
            document.getElementById('user-bio').innerText = profileData.bio;

            const container = document.getElementById('project-container');
            container.innerHTML = projectsData.map(project => `
                <div class="masonry-item">
                    <div class="card-hover bg-white border border-gray-100 rounded-2xl overflow-hidden">
                        <img src="${project.img}" alt="${project.title}" class="w-full h-auto block">
                        <div class="p-5">
                            <span class="text-[10px] font-black tracking-widest gold-accent uppercase">${project.tag}</span>
                            <h3 class="text-lg font-bold mt-1 group-hover:gold-accent">${project.title}</h3>
                            <p class="text-xs text-gray-400 mt-2 leading-relaxed">${project.desc}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        renderPage();
    </script>
</body>
</html>
